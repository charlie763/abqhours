# TimeBank Albuquerque - Jekyll config for GitHub Pages
# Edit the values below to update the site. No coding required.

title: "TimeBank Albuquerque"
description: "A way to swap & share skills & services using time exchange"
baseurl: "/abqhours"   # required for GitHub Pages project site (username.github.io/abqhours)
url: "https://charlie763.github.io"   # your GitHub Pages base URL

# --- All editable content is under "timebank:" ---
# Change stats, links, sample offers/requests here. Save and push to update the site.

timebank:
  # Brand colors (hex codes)
  # Palette (used for links/buttons + CSS variables)
  # #d9d4bf (217,212,191)
  # #5b0e0e (91,14,14)
  # #497570 (73,117,112)
  # #b58c44 (181,140,68)
  # #6c4f2f (108,79,47)
  brand_color: "#497570"
  brand_color_teal: "#b58c44"
  brand_color_dark: "#5b0e0e"
  footer_bg: "#6c4f2f"

  # Top bar links
  join_url: "https://hourworld.org/bank/Join.php"
  member_login_url: "https://hourworld.org"
  # If your timebank has a specific hOurworld ID, add it e.g. join_url: "https://hourworld.org/bank/Join.php?hw=1069"

  newsletter_url: ""   # optional - leave blank to hide newsletter link

  learn_more_url: "https://www.youtube.com/shorts/ziA3GenYc_Q"
  get_started_url: "https://www.hourworld.org/bank/index.htm?hw=1107"

  stats:
    local_hours: "0"
    local_hours_label: "local hours exchanged"
    years_local: "New"
    years_label: "Years in Albuquerque"
    local_members: "0"
    local_members_label: "local members"
    global_members: "31,289"
    global_members_label: "global network members"

  sample_offers:
    - title: "Weaving"
      description: "I have a small tapestry loom and can teach the basics of tapestry weaving."
    - title: "Seed Event"
      description: "I'd love to host a seedling event at my home. Folks can come over and we'll set up some seedlings together. I'll put on a pot of tea."
    - title: "Roller Skating"
      description: "If you or someone you know wants to learn how to roller skate or level up your roller skating skills, let me know."
    - title: "Decluttering"
      description: "I have helped people get de-cluttered, and organize their spaces before. Sometimes people just need a little non-judgmental assistance in clearing out the old to welcome the new."

  sample_requests:
    - title: "Language Practice"
      description: "Looking for a native European Portuguese speaker to practice with me."
    - title: "Fitness Help"
      description: "I would like some help setting up a fitness equipment workout plan for myself."
    - title: "Website Help"
      description: "I use SquareSpace for my portfolio website and edit it so infrequently that it's time consuming for me to add photos and texts. I'd like some pointers for editing my SquareSpace website."
    - title: "Mending and Alterations"
      description: "I know next to nothing about sewing. I'd love to be able to sew on a button, or mend a tear. I would also be open to learning how to crochet a hat or scarf!"
    
  

  quote: "Mutual aid ... means that every participant is both giver and recipient in acts of care that bind them together."
  quote_credit: "— Rebecca Solnit"

  footer_links:
    - label: "Connect With Us"
      url: "#"
    - label: "Member Login"
      url: "https://hourworld.org"
    - label: "Support Us"
      url: "#"
    - label: "Privacy Policy"
      url: "#"
    - label: "Terms of Service"
      url: "#"

  social:
    facebook: ""
