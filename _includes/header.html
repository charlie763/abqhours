{% assign tb = site.timebank %}
<header id="main-header">
  <div class="et_menu_container">
    <div class="logo_container">
      <a href="{{ '/' | relative_url }}">
        <svg
          class="logo-svg"
          viewBox="0 0 320 32"
          aria-labelledby="site-logo"
          role="img"
        >
          <title id="site-logo">{{ site.title }}</title>
          <text x="0" y="22" class="logo-text">{{ site.title }}</text>
        </svg>
      </a>
    </div>
    <button
      type="button"
      class="nav-toggle"
      aria-expanded="false"
      aria-controls="top-menu-nav"
      aria-label="Open navigation menu"
    >
      <span class="nav-toggle-bar" aria-hidden="true"></span>
      <span class="nav-toggle-bar" aria-hidden="true"></span>
      <span class="nav-toggle-bar" aria-hidden="true"></span>
    </button>
    <nav id="top-menu-nav" class="main-nav" aria-label="Main">
      <ul id="top-menu" class="nav">
        <li><a href="{{ '/' | relative_url }}">Home</a></li>
        <li><a href="{{ tb.learn_more_url }}">About</a></li>
        <li><a href="{{ tb.join_url }}">JOIN US</a></li>
        <li>
          <a href="{{ tb.member_login_url }}">MEMBER LOG-IN (hOurworld)</a>
        </li>
        {% if tb.newsletter_url != "" %}
        <li>
          <a href="{{ tb.newsletter_url }}">Get Our Monthly Newsletter</a>
        </li>
        {% endif %}
      </ul>
    </nav>
  </div>
</header>
